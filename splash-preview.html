<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babylonská pokladnice — Splash preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --sand: #c9a961;
    --lgold: #e8c659;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Cinzel', serif;
  }

  /* SPLASH OVERLAY */
  .splash-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: url('splash-bg.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }

  /* Vertical gradient overlay for text legibility */
  .splash-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.55) 0%,
      rgba(0, 0, 0, 0.15) 30%,
      rgba(0, 0, 0, 0.15) 60%,
      rgba(0, 0, 0, 0.65) 100%
    );
    pointer-events: none;
  }

  .splash-content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    animation: splashFadeIn 1.1s ease-out;
  }

  .splash-title-wrap {
    margin-top: 8vh;
  }

  .splash-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 9vw, 4.2rem);
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1.1;
    text-shadow:
      0 2px 12px rgba(0, 0, 0, 0.85),
      0 4px 28px rgba(212, 175, 55, 0.35);
  }

  .splash-subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.85rem, 2.8vw, 1.1rem);
    color: var(--lgold);
    letter-spacing: 0.4em;
    margin-top: 1rem;
    text-transform: uppercase;
    opacity: 0.85;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
  }

  .splash-button-wrap {
    margin-bottom: 12vh;
  }

  .splash-button {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 500;
    padding: 0.95rem 3rem;
    background: rgba(20, 14, 8, 0.55);
    color: var(--gold);
    border: 2px solid var(--gold);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: all 0.35s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow:
      0 4px 20px rgba(0, 0, 0, 0.5),
      inset 0 0 0 1px rgba(212, 175, 55, 0.15);
  }

  .splash-button:hover,
  .splash-button:active {
    background: var(--gold);
    color: #1a1410;
    transform: translateY(-2px);
    box-shadow:
      0 6px 28px rgba(212, 175, 55, 0.55),
      0 4px 20px rgba(0, 0, 0, 0.5);
  }

  /* Subtle gold ornament line above button */
  .splash-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 1.5rem;
    opacity: 0.7;
  }

  .splash-ornament-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .splash-ornament-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--gold);
  }

  /* VIDEO OVERLAY */
  .video-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #intro-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .fade-out {
    animation: overlayFadeOut 0.5s ease-in forwards;
  }

  @keyframes splashFadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes overlayFadeOut {
    to { opacity: 0; pointer-events: none; }
  }

  /* Demo notice */
  .demo-note {
    position: fixed;
    bottom: 12px;
    left: 12px;
    color: rgba(255, 255, 255, 0.4);
    font-family: monospace;
    font-size: 11px;
    z-index: 10000;
    background: rgba(0, 0, 0, 0.5);
    padding: 6px 10px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="splash-screen" class="splash-overlay">
  <div class="splash-content">
    <div class="splash-title-wrap">
      <h1 class="splash-title">Babylonská<br>pokladnice</h1>
      <div class="splash-subtitle">Tajemství zlata</div>
    </div>

    <div class="splash-button-wrap">
      <div class="splash-ornament">
        <span class="splash-ornament-line"></span>
        <span class="splash-ornament-dot"></span>
        <span class="splash-ornament-line"></span>
      </div>
      <button id="splash-enter" class="splash-button">Vstoupit</button>
    </div>
  </div>
</div>

<div class="demo-note">PREVIEW · klikni „Vstoupit"</div>

<script>
  const splash = document.getElementById('splash-screen');
  const enterBtn = document.getElementById('splash-enter');

  enterBtn.addEventListener('click', () => {
    splash.classList.add('fade-out');
    setTimeout(() => {
      splash.style.display = 'none';
      // V reálné aplikaci by se zde spustilo intro video
      document.body.innerHTML += '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#d4af37;font-family:Cinzel,serif;font-size:1.3rem;text-align:center;padding:2rem;">▶ Zde by se přehrálo intro.mp4<br><br><span style="font-size:0.9rem;opacity:0.7">…a poté hlavní aplikace</span></div>';
    }, 500);
  });
</script>

</body>
</html>
